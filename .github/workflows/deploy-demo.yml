name: deploy demo

on:
  push:
    branches: [main]
    paths:
      - "apps/demo/**"
      - ".github/workflows/deploy-demo.yml"
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/demo
    steps:
      - name: checkout
        uses: actions/checkout@v4
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: apps/demo/package-lock.json
      - name: install
        run: npm ci --legacy-peer-deps
      - name: build
        run: npm run build
        env:
          NEXT_PUBLIC_BASE_PATH: /hivesync
      - name: upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: apps/demo/out

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: deploy to github pages
        id: deployment
        uses: actions/deploy-pages@v4
